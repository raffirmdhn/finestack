[mysqld]
# Basic settings
port = 3306
basedir = C:/Users/Raffi/Programs/FineStack/current/mysql
datadir = C:/Users/Raffi/Programs/FineStack/data/mysql

# Logging
log_error = C:/Users/Raffi/Programs/FineStack/logs/mysql/error.log

# Character set
character-set-server = utf8mb4
collation-server = utf8mb4_unicode_ci

# Performance
max_connections = 100
key_buffer_size = 16M

# InnoDB settings
innodb_buffer_pool_size = 128M
innodb_log_file_size = 48M
innodb_flush_log_at_trx_commit = 1

# Query cache (deprecated in MySQL 8.0+, kept for compatibility)
# query_cache_size = 0
# query_cache_type = 0

# Binary logging (optional, for replication/backup)
# log_bin = C:/Users/Raffi/Programs/FineStack/logs/mysql/mysql-bin.log
# binlog_format = ROW

# Slow query log (optional, for performance tuning)
# slow_query_log = 1
# slow_query_log_file = C:/Users/Raffi/Programs/FineStack/logs/mysql/slow-query.log
# long_query_time = 2

[mysql]
default-character-set = utf8mb4

[client]
port = 3306
default-character-set = utf8mb4
