worker_processes 1;
error_log C:/Users/Raffi/Programs/FineStack/logs/nginx/error.log;
pid C:/Users/Raffi/Programs/FineStack/logs/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include C:/Users/Raffi/Programs/FineStack/config/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log C:/Users/Raffi/Programs/FineStack/logs/nginx/access.log;
    
    sendfile on;
    keepalive_timeout 65;
    
    # Default server (Laragon-style - serve all sites from sites/ directory)
    server {
        listen 80;
        server_name localhost;
        root C:/Users/Raffi/Programs/FineStack/sites;
        index index.php index.html index.htm;
        
        # Enable directory listing (optional)
        autoindex on;
        
        location / {
            try_files $uri $uri/ =404;
        }
        
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            include        C:/Users/Raffi/Programs/FineStack/apps/nginx/1.28/conf/fastcgi_params;
        }
        
        location ~ /\.ht {
            deny all;
        }
    }
    
    # Include site-specific configs
    include C:/Users/Raffi/Programs/FineStack/config/nginx/sites/*.conf;
}
